name: Auto Update README

on:
  create:
    branches:
      - '*'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main  # <-- sempre edita o README do main, não da branch nova

      - name: Update README with branch name
        env:
          BRANCH: ${{ github.ref_name }}
          REPO: https://github.com/lucaspaiva-lp/python-lab
        run: |
          python3 - <<'EOF'
          import os, re

          branch = os.environ["BRANCH"]
          repo   = os.environ["REPO"]

          with open("README.md", "r") as f:
              content = f.read()

          # Extrai apenas o bloco da seção Branches para checar duplicata
          branches_block = re.search(
              r'## Branches\n.*?^---',
              content,
              flags=re.DOTALL | re.MULTILINE
          )

          if branches_block and f"/{branch})" in branches_block.group(0):
              print(f"Branch '{branch}' já listada na seção Branches. Nada a fazer.")
              exit(0)

          # Insere a nova entrada antes do '---' que encerra a seção Branches
          new_entry = f"* [`{branch}`]({repo}/tree/{branch})"

          def insert_branch(m):
              section = m.group(0)
              # Remove o '---' do final, adiciona a entrada, recoloca o '---'
              without_sep = re.sub(r'\n---$', '', section)
              return without_sep.rstrip() + f"\n{new_entry}\n\n---"

          updated = re.sub(
              r'## Branches\n.*?^---',
              insert_branch,
              content,
              count=1,
              flags=re.DOTALL | re.MULTILINE
          )

          if updated == content:
              print("Padrão não encontrado no README. Verifique a estrutura.")
              exit(1)

          with open("README.md", "w") as f:
              f.write(updated)

          print(f"README atualizado com a branch: {branch}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain README.md) ]]; then
            git add README.md
            git commit -m "docs: auto-update README com a branch ${{ github.ref_name }}"
            git push origin main  # <-- push explícito para o main
          else
            echo "Nenhuma alteração detectada."
          fi